project_name: industrial-ts-anomaly
random_state: 42

data:
  data_root: data/数据报表_20260405
  mapping_file: data/数据报表_20260405/点位及治理工艺.xlsx
  file_glob: "**/*.xls"
  max_files: null
  parse_batch_size: 20
  parse_cache_dir: outputs/cache/parsed

cleaning:
  drop_all_nan_col: true
  clip_quantiles: [0.001, 0.999]
  min_non_na_ratio_for_numeric: 0.05

labeling:
  normal_values: ["正常(N)", "正常", "N", "-", ""]
  maintenance_values: ["维护(M)", "M", "维护"]

features:
  windows: [5, 10, 30, 60]
  max_base_numeric_features: 20
  threshold_count_windows: [10, 30, 60]

split:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

models:
  enabled: ["logreg", "random_forest", "lightgbm", "hist_gbm"]
  threshold_min_precision: 0.30
  max_train_rows: 80000
  max_val_rows: 20000
